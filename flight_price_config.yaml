sources:
  travelpayouts:
    enabled: true
    mode: "api"
    token_env: TRAVELPAYOUTS_TOKEN
    currency: jpy
    market: jp
    max_requests_per_run: 300
    offers_limit: 5
    flexible_core_fallback: true
    flexible_global_fallback: true
    flexible_period_type: month
    flexible_offers_limit: 10
    pause_every_requests: 80
    pause_seconds: 5
    retry_attempts: 3
    retry_base_sleep_seconds: 2
    marker: ""
  amadeus:
    enabled: false
    mode: "api"
    environment: "test"
    client_id_env: AMADEUS_CLIENT_ID
    client_secret_env: AMADEUS_CLIENT_SECRET
    max_requests_per_run: 50
    offers_limit: 3
  google_flights:
    enabled: true
    mode: "link_only"
  skyscanner:
    enabled: true
    mode: "link_only"
  trip_com:
    enabled: true
    mode: "link_only"
  ctrip:
    enabled: true
    mode: "link_only"
  fliggy:
    enabled: true
    mode: "link_only"
  airline_official:
    enabled: false
    mode: "link_only"
  playwright_optional:
    enabled: false
    max_requests_per_run: 20
    skip_on_login_or_captcha: true
