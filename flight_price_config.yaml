smtp:
  host: smtp.gmail.com
  port: 587
  use_tls: true
  username: "hailuwang71@gmail.com"

email:
  from: "hailuwang71@gmail.com"
  to:
    - "hailuwang71@gmail.com"
  # 朋友邮箱写在这里。global / domestic 模式会同时发给 email.to 和 friends_to。
  friends_to:
    - "tyuu7517@gmail.com"
    - "andyping1989@yahoo.co.jp"
  send_global_domestic_to_friends: true
  friend_scopes:
    - global
    - domestic
  # 日本国内路线：自己继续收单程；朋友收到单独生成的往返结果。
  friend_domestic_roundtrip_enabled: true
  # 朋友版国内往返阈值 = domestic_routes 里的单程阈值 x 这个倍率。
  friend_domestic_roundtrip_threshold_multiplier: 2.0
  # 周报默认仍然只发给自己；如果也想发给朋友，改成 true。
  send_weekly_report_to_friends: false
  password_env: SMTP_PASSWORD

