topix_candidates:
  - "^TOPX"
  - "998405.T"
  - "1306.T"
  - "1348.T"

log_file: monitor.log
state_file: alert_state.json

signal_log:
  enabled: true
  path: stock_signal_log.csv
  append_only: true

email_policy:
  daily_summary_default: true
  send_individual_alerts: true
  notify_action_levels:
    - A
    - B
  send_summary_when_no_notify_alerts: false
  individual_alert_types:
    - weak_deep_pullback
    - pullback_but_overheated
    - breakout_but_overheated
    - pullback_watch
    - deep_pullback_trend_intact
  send_sector_heat_individual: false

smtp:
  host: smtp.gmail.com
  port: 587
  use_tls: true
  username: your_email@example.com

email:
  from: your_email@example.com
  to:
    - your_email@example.com

thresholds:
  pullback_min_pct: 20
  pullback_max_pct: 35
  relative_3m_min_pct: -10
  min_avg_turnover_20d_jpy: 1000000000
  breakout_relative_3m_min_pct: 10
  deep_pullback_min_pct: 35
  risk_relative_3m_max_pct: -15
  trend_intact_relative_3m_min_pct: -5
  trend_intact_above_ma200_min_pct: 0
  sector_heat_60d_high_ratio: 0.4
  sector_heat_relative_20d_min_pct: 8
  overheat_return_60d_min_pct: 80
  overheat_above_ma200_min_pct: 40
  overheat_volume_spike_days: 3
  dedup_days: 30
  extra_drawdown_pct: 10

user_profile:
  investable_capital_jpy: 10000000
  single_stock_initial_limit_pct: 1.5
  single_stock_max_limit_pct: 3.0
  allow_odd_lot: false

screening:
  deep_pullback_threshold_pct: 35
  min_relative_return_vs_topix_3m_pct: -5
  require_above_200dma: true
  reentry_days_above_200dma: 5

risk_labels:
  high_position_warning_pct: 3.0
  very_high_position_warning_pct: 5.0

output:
  distinguish_research_and_buy_rating: true
  show_lot_size_analysis: true
  show_valuation_warning: true
  show_fundamental_confirmation: true

