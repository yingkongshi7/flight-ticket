name: Flight Price Monitor

on:
  schedule:
    # 23:00 UTC = 08:00 JST next day: daily core routes
    - cron: "0 23 * * *"

    # 23:30 UTC = 08:30 JST next day: daily global routes
    - cron: "30 23 * * *"

    # 00:00 UTC Saturday = 09:00 JST Saturday: weekly report
    - cron: "0 0 * * 6"

    # 00:30 UTC Saturday = 09:30 JST Saturday: weekly domestic routes
    - cron: "30 0 * * 6"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        default: "core"
        options:
          - core
          - weekly
          - global
          - domestic
          - all
          - core-force
          - global-force
          - domestic-force
          - core-force-alerts
          - global-force-alerts
          - domestic-force-alerts
          - dry-run

permissions:
  contents: write

concurrency:
  group: flight-price-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
      AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
      AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync latest state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Decide command
        id: decide
        shell: bash
        run: |
          commit_state=true

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.mode }}" in
              weekly)
                command="python flight_price_monitor.py --config flight_price_config.yaml --weekly-report"
                commit_state=false
                ;;

              global)
                command="python flight_price_monitor.py --config flight_price_config.yaml --global-only"
                ;;

              domestic)
                command="python flight_price_monitor.py --config flight_price_config.yaml --domestic-only"
                ;;

              all)
                command="python flight_price_monitor.py --config flight_price_config.yaml"
                ;;

              core-force)
                command="python flight_price_monitor.py --config flight_price_config.yaml --core-only --force"
                ;;

              global-force)
                command="python flight_price_monitor.py --config flight_price_config.yaml --global-only --force"
                ;;

              domestic-force)
                command="python flight_price_monitor.py --config flight_price_config.yaml --domestic-only --force"
                ;;

              core-force-alerts)
                command="python flight_price_monitor.py --config flight_price_config.yaml --core-only --force --force-alerts"
                ;;

              global-force-alerts)
                command="python flight_price_monitor.py --config flight_price_config.yaml --global-only --force --force-alerts"
                ;;

              domestic-force-alerts)
                command="python flight_price_monitor.py --config flight_price_config.yaml --domestic-only --force --force-alerts"
                ;;

              dry-run)
                command="python flight_price_monitor.py --config flight_price_config.yaml --core-only --link-only --dry-run"
                commit_state=false
                ;;

              core|*)
                command="python flight_price_monitor.py --config flight_price_config.yaml --core-only"
                ;;
            esac

          else
            case "${{ github.event.schedule }}" in
              "0 23 * * *")
                command="python flight_price_monitor.py --config flight_price_config.yaml --core-only"
                ;;

              "30 23 * * *")
                command="python flight_price_monitor.py --config flight_price_config.yaml --global-only"
                ;;

              "0 0 * * 6")
                command="python flight_price_monitor.py --config flight_price_config.yaml --weekly-report"
                commit_state=false
                ;;

              "30 0 * * 6")
                command="python flight_price_monitor.py --config flight_price_config.yaml --domestic-only"
                ;;

              *)
                echo "Unknown schedule: ${{ github.event.schedule }}"
                exit 1
                ;;
            esac
          fi

          echo "command=$command" >> "$GITHUB_OUTPUT"
          echo "commit_state=$commit_state" >> "$GITHUB_OUTPUT"

          echo "Selected command: $command"
          echo "Commit state: $commit_state"

      - name: Run monitor
        run: ${{ steps.decide.outputs.command }}

      - name: Commit state
        if: steps.decide.outputs.commit_state == 'true'
        shell: bash
        run: |
          if [ ! -f flight_price_state.json ]; then
            echo "No flight_price_state.json to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add flight_price_state.json

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "update flight price state"
          git push origin HEAD:"${GITHUB_REF_NAME}"
