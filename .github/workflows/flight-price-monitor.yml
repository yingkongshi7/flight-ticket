name: Flight Price Monitor

on:
  schedule:
    # 23:00 UTC = 08:00 JST next day: daily core routes
    - cron: "0 23 * * *"
    # 23:30 UTC = 08:30 JST next day: daily global routes
    - cron: "30 23 * * *"
    # 00:00 UTC Saturday = 09:00 JST Saturday: weekly report
    - cron: "0 0 * * 6"
    # 00:30 UTC Saturday = 09:30 JST Saturday: weekly domestic routes
    - cron: "30 0 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        default: "core"
        options:
          - core
          - weekly
          - global
          - domestic
          - all
          - core-force
          - global-force
          - domestic-force
          - core-force-alerts
          - global-force-alerts
          - domestic-force-alerts
          - dry-run

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
      AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
      AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run monitor
        run: |
          commit_state=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.mode }}" in
              weekly) commit_state=false; python flight_price_monitor.py --config flight_price_config.yaml --weekly-report ;;
              global) python flight_price_monitor.py --config flight_price_config.yaml --global-only ;;
              domestic) python flight_price_monitor.py --config flight_price_config.yaml --domestic-only ;;
              all) python flight_price_monitor.py --config flight_price_config.yaml ;;
              core-force) python flight_price_monitor.py --config flight_price_config.yaml --core-only --force ;;
              global-force) python flight_price_monitor.py --config flight_price_config.yaml --global-only --force ;;
              domestic-force) python flight_price_monitor.py --config flight_price_config.yaml --domestic-only --force ;;
              core-force-alerts) python flight_price_monitor.py --config flight_price_config.yaml --core-only --force --force-alerts ;;
              global-force-alerts) python flight_price_monitor.py --config flight_price_config.yaml --global-only --force --force-alerts ;;
              domestic-force-alerts) python flight_price_monitor.py --config flight_price_config.yaml --domestic-only --force --force-alerts ;;
              dry-run) commit_state=false; python flight_price_monitor.py --config flight_price_config.yaml --core-only --link-only --dry-run ;;
              *) python flight_price_monitor.py --config flight_price_config.yaml --core-only ;;
            esac
          elif [ "$(date -u +%u)" = "6" ] && [ "$(date -u +%H:%M)" = "00:00" ]; then
            commit_state=false
            python flight_price_monitor.py --config flight_price_config.yaml --weekly-report
          elif [ "$(date -u +%u)" = "6" ] && [ "$(date -u +%H:%M)" = "00:30" ]; then
            python flight_price_monitor.py --config flight_price_config.yaml --domestic-only
          elif [ "$(date -u +%H:%M)" = "23:30" ]; then
            python flight_price_monitor.py --config flight_price_config.yaml --global-only
          else
            python flight_price_monitor.py --config flight_price_config.yaml --core-only
          fi
          echo "commit_state=${commit_state}" >> "$GITHUB_ENV"
      - name: Commit state
        run: |
          if [ "${commit_state}" != "true" ]; then
            echo "State commit skipped for this mode."
            exit 0
          fi
          if [ ! -f flight_price_state.json ]; then
            echo "No flight_price_state.json to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flight_price_state.json
          git diff --cached --quiet || (git commit -m "update flight price state" && git pull --rebase && git push)
